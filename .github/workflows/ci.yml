name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ['golang', 'docker', 'protobuf']

    steps:
      - uses: actions/checkout@v4

      - name: Test ${{ matrix.module }}
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: v0.19.11
          verb: call
          args: --mod ./${{ matrix.module }}/tests call all
